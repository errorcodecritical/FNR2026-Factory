session_control:
  ros__parameters:
    mode: record
    joy_topic: /joy
    start_button_idx: 7       # START
    stop_button_idx: 6        # BACK
    waypoint_button_idx: 2    # X (unused in record mode)
    recordings_dir: /shared/recordings
    record_topics:
      - /scan
      - /imu/data
      - /odometry/filtered
      - /tf
      - /tf_static
      - /cmd_vel
