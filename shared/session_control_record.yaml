session_control:
  ros__parameters:
    mode: record
    joy_topic: /joy
    start_button_idx: 0       # A
    stop_button_idx: 1        # B
    waypoint_button_idx: 2    # X (unused in record mode)
    recordings_dir: /shared/recordings
    record_all: true
    record_topics:
      - /scan
      - /imu/data
      - /odom_wheel
      - /odometry/filtered
      - /tf
      - /tf_static
      - /cmd_vel
