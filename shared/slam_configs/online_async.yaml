slam_toolbox:
  ros__parameters:
    scan_topic:  /scan
    odom_topic:  /odometry/filtered
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link

    publish_tf:  true
    mode:        mapping

    # ─────────────────────────────────────────────────────────────────────
    # RESOLUTION — maximum detail for a small space
    # 0.01 m = 1 cm per cell, appropriate for RPLidar in a 2×1.5 m room.
    # Do not go below 0.01 — RPLidar A1/A2 angular resolution (~0.33°) at
    # 1.5 m range gives ~8 mm point spacing, so 1 cm cells are at the
    # limit of what the sensor can actually resolve.
    # ─────────────────────────────────────────────────────────────────────
    resolution:       0.05
    max_laser_range:  12.0
                            # without including spurious long-range noise

    # ─────────────────────────────────────────────────────────────────────
    # UPDATE INTERVALS — update aggressively for a small slow-moving robot
    # ─────────────────────────────────────────────────────────────────────
    map_update_interval:      0.5
    transform_publish_period: 0.02  # 50 Hz TF — keep smooth

    # Very small movement thresholds — in a 2 m room you need detail
    # from every position, not just after travelling 20+ cm
    minimum_travel_distance:  0.05
    minimum_travel_heading:   0.05
    minimum_time_interval:    0.2

    # ─────────────────────────────────────────────────────────────────────
    # LOOP CLOSURE — critical even in a small room
    # In a 2×1.5 m space the robot will revisit all positions frequently.
    # Tight loop closure keeps accumulated drift from distorting the map.
    # ─────────────────────────────────────────────────────────────────────
    do_loop_closing:                    true
    loop_search_maximum_distance:       5.0
    loop_match_minimum_chain_size:      10
    loop_match_minimum_response_fine:   0.55  # high — demand good match quality
    loop_match_minimum_response_coarse: 0.4   # higher than default — avoid false closures
                                              # in a symmetric room (corridors, plain walls)

    # ─────────────────────────────────────────────────────────────────────
    # SCAN MATCHING — tight parameters for maximum positional accuracy
    # ─────────────────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: true

    # Search space: in a 2 m room odometry error between scans is small.
    # A 0.3 m search window is more than enough and avoids false matches
    # on symmetric geometry (e.g. two identical walls opposite each other).
    correlation_search_space_dimension:       0.5
    correlation_search_space_resolution:      0.01
    correlation_search_space_smear_deviation: 0.1

    # Large scan buffer — keep many scans in memory since the room is tiny
    # and revisiting all positions happens constantly
    scan_buffer_size:                  30
    scan_buffer_maximum_scan_distance: 10.0

    # Demand high quality scan links — in a small room a bad link will
    # visibly distort the whole map
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance:       1.5

    # ─────────────────────────────────────────────────────────────────────
    # SOLVER — unchanged, Ceres is well suited for small dense graphs
    # ─────────────────────────────────────────────────────────────────────
    solver_plugin:        solver_plugins::CeresSolver
    ceres_linear_solver:  SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type:    TRADITIONAL_DOGLEG
    ceres_loss_function:  None
    stack_size_to_use:    40000000

    # ─────────────────────────────────────────────────────────────────────
    # TIMING
    # ─────────────────────────────────────────────────────────────────────
    debug_logging:      false
    throttle_scans:     1       # process every single scan — small room,
                                # low CPU cost per scan
    transform_timeout:  0.5
    tf_buffer_duration: 60.0

    strategy:               1
    use_response_expansion: true