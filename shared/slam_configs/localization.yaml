slam_toolbox:
  ros__parameters:

    # ─────────────────────────────────────────────────────────────────────
    # ROS COMMUNICATION
    # ─────────────────────────────────────────────────────────────────────
    scan_topic:  /scan
    odom_topic:  /odom
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link

    publish_tf:  true
    mode:        localization

    # ─────────────────────────────────────────────────────────────────────
    # MAP CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────
    map_file_name: /shared/maps/fnr26_map/fnr26_map

    # Use pose estimate from /initialpose topic (RViz 2D Pose Estimate)
    # or set map_start_pose to your known starting position.
    # Both cannot be active simultaneously — comment out map_start_pose
    # if using RViz to set the initial pose manually.
    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]   # [x, y, theta_radians] in map frame

    # ─────────────────────────────────────────────────────────────────────
    # RESOLUTION — must match the map that was built
    # ─────────────────────────────────────────────────────────────────────
    resolution:       0.01   # must match mapping config
    max_laser_range:  3.5    # must match mapping config

    # ─────────────────────────────────────────────────────────────────────
    # UPDATE PARAMETERS — responsive for a small room
    # ─────────────────────────────────────────────────────────────────────
    map_update_interval:      0.1
    transform_publish_period: 0.02
    minimum_time_interval:    0.2
    minimum_travel_distance:  0.01
    minimum_travel_heading:   0.01

    # ─────────────────────────────────────────────────────────────────────
    # SCAN MATCHING — wide initial search, tight once locked
    # ─────────────────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: true

    scan_buffer_size:                  200
    scan_buffer_maximum_scan_distance: 3.5

    # Wide search space for initial pose acquisition — once the robot has
    # localised, slam_toolbox narrows this automatically
    correlation_search_space_dimension:       1.5    # wide for initial lock
    correlation_search_space_resolution:      0.005  # fine resolution matches map detail
    correlation_search_space_smear_deviation: 0.05   # tight smear — high detail map

    # Demand good match quality — small room with high detail map means
    # a good match should always score well
    link_match_minimum_response_fine: 0.55
    link_scan_maximum_distance:       1.0

    # Loop closure not needed in localization mode
    do_loop_closing: false

    # ─────────────────────────────────────────────────────────────────────
    # SOLVER
    # ─────────────────────────────────────────────────────────────────────
    solver_plugin:        solver_plugins::CeresSolver
    ceres_linear_solver:  SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type:    TRADITIONAL_DOGLEG
    ceres_loss_function:  None
    stack_size_to_use:    40000000

    # ─────────────────────────────────────────────────────────────────────
    # TIMING
    # ─────────────────────────────────────────────────────────────────────
    debug_logging:      false
    throttle_scans:     1
    transform_timeout:  0.5
    tf_buffer_duration: 60.0