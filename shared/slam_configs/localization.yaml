slam_toolbox:
  ros__parameters:

    # ─────────────────────────────────────────────────────────────────────
    # ROS COMMUNICATION
    # ─────────────────────────────────────────────────────────────────────
    scan_topic:  /scan
    odom_topic:  /odom
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link

    publish_tf:  true
    mode:        localization

    # ─────────────────────────────────────────────────────────────────────
    # MAP CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────
    map_file_name: /shared/maps/fnr26_map/fnr26_map

    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]

    # ─────────────────────────────────────────────────────────────────────
    # RESOLUTION
    # ─────────────────────────────────────────────────────────────────────
    resolution:       0.01
    max_laser_range:  3.5

    # ─────────────────────────────────────────────────────────────────────
    # UPDATE PARAMETERS
    # ─────────────────────────────────────────────────────────────────────
    # CHANGED: 5s → 30s — map is static in localization mode, no need to
    # re-broadcast a large occupancy grid every 5 seconds over WiFi.
    map_update_interval:      30.0

    # CHANGED: 0.2 → 0.05 — TF is tiny, publish it fast so nav stays smooth.
    transform_publish_period: 0.05

    # CHANGED: 0.2 → 0.5 — process a scan at most every 500ms.
    # Localization does not need 5Hz scan matching on an RPi4 over WiFi.
    minimum_time_interval:    0.5

    # CHANGED: tightened travel thresholds so scans are only processed when
    # the robot has actually moved meaningfully — reduces idle CPU+DDS load.
    minimum_travel_distance:  0.05   # was 0.01 — too sensitive, fires constantly
    minimum_travel_heading:   0.05   # was 0.01

    # ─────────────────────────────────────────────────────────────────────
    # SCAN MATCHING
    # ─────────────────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: true

    # CHANGED: 200 → 10 — a 200-scan buffer is a mapping config value.
    # In localization you only need recent scans for correlation; a large
    # buffer wastes RAM and slows the solver on every match cycle.
    scan_buffer_size:                  10
    scan_buffer_maximum_scan_distance: 3.5

    correlation_search_space_dimension:       1.5
    correlation_search_space_resolution:      0.005
    correlation_search_space_smear_deviation: 0.05

    link_match_minimum_response_fine: 0.55
    link_scan_maximum_distance:       1.0

    do_loop_closing: false

    # ─────────────────────────────────────────────────────────────────────
    # SOLVER
    # ─────────────────────────────────────────────────────────────────────
    solver_plugin:        solver_plugins::CeresSolver
    ceres_linear_solver:  SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type:    TRADITIONAL_DOGLEG
    ceres_loss_function:  None
    stack_size_to_use:    40000000

    # ─────────────────────────────────────────────────────────────────────
    # TIMING
    # ─────────────────────────────────────────────────────────────────────
    debug_logging:      false

    # CHANGED: 1 → 3 — only process every 3rd scan from the LiDAR.
    # At typical RPLidar rates (10Hz) this gives you ~3Hz scan matching,
    # which is plenty for localization and cuts DDS + CPU load by 3x.
    throttle_scans:     3

    transform_timeout:  0.5
    tf_buffer_duration: 30.0   # CHANGED: 60s → 30s — halves TF buffer memory on RPi4