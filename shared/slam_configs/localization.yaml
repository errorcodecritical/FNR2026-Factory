slam_toolbox:
  ros__parameters:

    # ─────────────────────────────────────────────────────────────────────
    # ROS COMMUNICATION
    # ─────────────────────────────────────────────────────────────────────
    scan_topic:  /scan
    odom_topic:  /odom
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link

    publish_tf:  true    # slam_toolbox publishes map → odom
    mode:        localization

    # ─────────────────────────────────────────────────────────────────────
    # MAP CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────

    # Path without extension — slam_toolbox appends .yaml and .pgm itself
    map_file_name: /shared/maps/club_room/club_room

    # Let scan matching determine initial pose rather than forcing a fixed
    # starting point. Set map_start_at_dock: true if you have a known dock
    # position defined in the map, or set map_start_pose explicitly if you
    # always start the robot at a known location.
    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]  # uncomment if needed

    # ─────────────────────────────────────────────────────────────────────
    # PERFORMANCE AND RESOLUTION
    # ─────────────────────────────────────────────────────────────────────
    resolution:       0.05
    max_laser_range:  12.0

    # ─────────────────────────────────────────────────────────────────────
    # UPDATE PARAMETERS
    # ─────────────────────────────────────────────────────────────────────
    map_update_interval:      5.0
    transform_publish_period: 0.02
    minimum_time_interval:    0.5
    minimum_travel_distance:  0.2
    minimum_travel_heading:   0.2

    # ─────────────────────────────────────────────────────────────────────
    # SCAN MATCHING
    # ─────────────────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: true

    scan_buffer_size:                     10
    scan_buffer_maximum_scan_distance:    10.0
    link_match_minimum_response_fine:     0.1
    link_scan_maximum_distance:           1.5

    # Wider search space for initial localisation
    correlation_search_space_dimension:       1.5   # was 0.5 — search wider area
    correlation_search_space_resolution:      0.01
    correlation_search_space_smear_deviation: 0.1   # was 0.1 — more forgiving match

    # Loop closure is not used in localization mode — disable to save CPU
    do_loop_closing: false

    # ─────────────────────────────────────────────────────────────────────
    # SOLVER
    # ─────────────────────────────────────────────────────────────────────
    solver_plugin:        solver_plugins::CeresSolver
    ceres_linear_solver:  SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type:    TRADITIONAL_DOGLEG
    ceres_loss_function:  None
    stack_size_to_use:    40000000

    # ─────────────────────────────────────────────────────────────────────
    # TIMING — raised for WiFi latency between RPi4 and desktop
    # ─────────────────────────────────────────────────────────────────────
    debug_logging:      false
    throttle_scans:     1
    transform_timeout:  0.5    # raised from 0.2 — avoids TF lookup failures over WiFi
    tf_buffer_duration: 60.0   # raised from 30.0 — keeps more TF history for late packets