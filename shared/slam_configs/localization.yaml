slam_toolbox:
  ros__parameters:

    # ─────────────────────────────────────────────────────────────────────
    # ROS COMMUNICATION
    # ─────────────────────────────────────────────────────────────────────
    scan_topic:  /scan
    odom_topic:  /odometry/filtered
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link

    publish_tf:  true
    mode:        localization # Crucial: uses map_file_name for localization

    # ─────────────────────────────────────────────────────────────────────
    # MAP CONFIGURATION
    # ─────────────────────────────────────────────────────────────────────
    map_file_name: /shared/maps/fnr26_map/fnr26_map
    map_start_at_dock: false
    map_start_pose: [0.0, 0.0, 0.0]

    # ─────────────────────────────────────────────────────────────────────
    # RESOLUTION & RANGE
    # ─────────────────────────────────────────────────────────────────────
    resolution:       0.05
    max_laser_range:  12.0

    # ─────────────────────────────────────────────────────────────────────
    # UPDATE PARAMETERS (Optimized for Small Space)
    # ─────────────────────────────────────────────────────────────────────
    # Re-publish map very rarely since it is static in localization mode.
    map_update_interval:      10.0

    # Publish TF at 50Hz to ensure Nav2 controllers have smooth data.
    transform_publish_period: 0.02

    # In a 2x2m box, we need high-frequency updates.
    minimum_time_interval:    0.1   # Process scans at 10Hz
    throttle_scans:           1     # Do not skip scans; use every data point
    
    # Update the map-to-odom transform for even tiny movements.
    minimum_travel_distance:  0.01  
    minimum_travel_heading:   0.02

    # ─────────────────────────────────────────────────────────────────────
    # SCAN MATCHING (High Precision Tuning)
    # ─────────────────────────────────────────────────────────────────────
    use_scan_matching:   true
    use_scan_barycenter: true

    # Keep a small buffer of recent scans to maintain CPU efficiency.
    scan_buffer_size:                  30
    scan_buffer_maximum_scan_distance: 10.0

    # Tiny search space: in a 2x2m room, we shouldn't search more than 0.5m away.
    correlation_search_space_dimension:       0.5
    correlation_search_space_resolution:      0.005
    correlation_search_space_smear_deviation: 0.02  # Sharper match for clear walls

    # High threshold: only accept very "sure" matches to prevent spazzing.
    link_match_minimum_response_fine: 0.75
    link_scan_maximum_distance:       1.0

    do_loop_closing: false # Not needed for 2x2m localization

    # ─────────────────────────────────────────────────────────────────────
    # SOLVER (Ceres is best for RPi4)
    # ─────────────────────────────────────────────────────────────────────
    solver_plugin:        solver_plugins::CeresSolver
    ceres_linear_solver:  SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type:    TRADITIONAL_DOGLEG
    ceres_loss_function:  None
    stack_size_to_use:    40000000

    # ─────────────────────────────────────────────────────────────────────
    # TIMING & SYSTEM
    # ─────────────────────────────────────────────────────────────────────
    debug_logging:      false
    transform_timeout:  0.2
    tf_buffer_duration: 10.0   # Reduced to save RAM on RPi4
