amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: /scan

    # ── Particle filter ───────────────────────────────────────────────
    min_particles: 500
    max_particles: 2000
    # How fast to recover from localisation loss — keep low to avoid
    # injecting random particles when the robot is already localised
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1

    # ── Initial pose covariance ───────────────────────────────────────
    # Tighter values = less spazzing on pose set; widen if pose is uncertain
    initial_cov_xx: 0.25      # 0.5m std dev in x
    initial_cov_yy: 0.25      # 0.5m std dev in y
    initial_cov_aa: 0.068     # ~15 deg std dev in yaw

    # ── Motion model ──────────────────────────────────────────────────
    # Omni model for mecanum robot — critical, diff model causes divergence
    robot_model_type: "nav2_amcl::OmniMotionModel"
    # Noise params: lower = trust odometry more = less jitter
    alpha1: 0.1    # rot noise from rot
    alpha2: 0.1    # rot noise from trans
    alpha3: 0.1    # trans noise from trans
    alpha4: 0.1    # trans noise from rot
    alpha5: 0.1    # strafe noise (omni only)

    # ── Laser model ───────────────────────────────────────────────────
    laser_model_type: "likelihood_field"
    laser_max_range: 12.0
    laser_min_range: 0.1
    max_beams: 60
    laser_likelihood_max_dist: 2.0
    # Mixture weights — must sum to 1.0
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2

    # ── Update thresholds ─────────────────────────────────────────────
    # Only update filter when robot has moved enough — reduces jitter
    update_min_d: 0.2         # metres
    update_min_a: 0.5         # radians (~28 deg)
    resample_interval: 2

    # ── Transform ─────────────────────────────────────────────────────
    transform_tolerance: 0.5
    tf_broadcast: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max:  0.5
      vx_min: -0.5
      vy_max:  0.5
      wz_max:  1.0
      ax_max:  3.0
      ax_min: -3.0
      ay_max:  3.0
      az_max:  3.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.4
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.4
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000.0
        near_goal_distance: 1.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.4
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.4
        max_angle_to_furthest: 1.0
        forward_preference: true
planner_server:
  ros__parameters:
    use_sim_time: false
    robot_base_frame: base_link
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false

local_costmap:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    rolling_window: true
    robot_radius: 0.175      # ~half diagonal of 25x25cm box
    width: 4.0
    height: 4.0
    resolution: 0.05
    update_frequency: 5.0
    publish_frequency: 2.0
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: scan
      scan:
        topic: /scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.15
      cost_scaling_factor: 1.0
    always_send_full_costmap: true

global_costmap:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    rolling_window: false
    robot_radius: 0.175      # ~half diagonal of 25x25cm box
    resolution: 0.05
    update_frequency: 1.0
    publish_frequency: 1.0
    plugins: ["static_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.15
      cost_scaling_factor: 1.0
    always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "/cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 0.5
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: /scan
      min_height: 0.15
      max_height: 2.0
      enabled: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      # - map_server
      # - amcl
      - planner_server
      - controller_server
      - bt_navigator
      - behavior_server
      - collision_monitor