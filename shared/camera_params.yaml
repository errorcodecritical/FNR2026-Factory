# camera_params.yaml
# -------------------
# Parameters for the camera_ros node running on the RPi4.
#
# Tune width, height and framerate to balance quality vs network bandwidth —
# raw frames at 1280x720@30fps over WiFi will saturate the link.
# Use compressed_image_transport (republish node) to send JPEG-compressed 
# frames across the network instead of raw.

camera_ros_node:
  ros__parameters:

    # ── Camera selection ─────────────────────────────────────────────────────
    # List available cameras with: libcamera-hello --list-cameras
    camera: 0                    # Default camera index (0 for first available)

    # ── Frame ────────────────────────────────────────────────────────────────
    camera_frame_id: "camera_link"

    # ── Resolution ───────────────────────────────────────────────────────────
    # Pi Camera Module v2: supports up to 1920x1080
    # Pi Camera Module v3: supports up to 4608x2592 (downscale for ROS)
    # Reduce resolution if WiFi bandwidth is limited
    width: 640
    height: 480

    # ── Framerate ────────────────────────────────────────────────────────────
    # 15 fps for bandwidth-limited networks, 30 fps for local connections
    framerate: 15.0

    # ── Camera info ──────────────────────────────────────────────────────────
    # Path to calibration file produced by ros2 run camera_calibration
    # Leave empty if uncalibrated — camera_info topic will have zero values
    camera_info_url: "file:///shared/camera_info/unicam.yaml"

    # ── Image transport ─────────────────────────────────────────────────────
    # Use sensor QoS for best performance
    use_sensor_data_qos: true
