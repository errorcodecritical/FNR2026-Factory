# mecanum_driver_params.yaml
# --------------------------
# ROS 2 parameter file covering both nodes launched by mecanum_driver.launch.py:
#
#   motor_driver    – serial bridge to the Pico motor controller
#   mecanum_driver  – kinematics, PI velocity control, and odometry
#
# Load with:
#   ros2 launch mecanum_driver mecanum_driver.launch.py \
#       --ros-args --params-file mecanum_driver_params.yaml
# or inside a launch file:
#   Node(parameters=['/path/to/mecanum_driver_params.yaml'])

# =============================================================================
# motor_driver node  –  serial bridge to the Pico
# =============================================================================
motor_driver:
  ros__parameters:

    # Serial device that enumerates when the Pico is plugged in.
    # Uses persistent udev symlink: Pico → /dev/ttyACM_PICO
    # See /etc/udev/rules.d/99-usb-serial.rules for device mappings
    serial_port:  "/dev/ttyACM_PICO"   # persistent symlink for Pico

    # Must match the value set in the Pico firmware.
    baud_rate:  115200

    # Serial read timeout.  If no byte arrives within this window the driver
    # logs a warning.  Increase if the Pico is slow to respond.
    cmd_timeout:  1.0              # [s]

    # Pico resets on USB connect; this delay lets the bootloader finish
    # before the driver sends any commands.
    reconnect_delay:  2.0          # [s]

    # How often to request encoder counts from the Pico.
    # Should be >= control_rate (mecanum_driver) so the PI loop always has
    # a fresh measurement.
    encoder_poll_rate:  50.0       # [Hz]


# =============================================================================
# mecanum_driver node  –  kinematics, PI velocity control, and odometry
# =============================================================================
mecanum_driver:
  ros__parameters:

    # -------------------------------------------------------------------------
    # Robot geometry  —  all values sourced directly from robot.urdf.xacro
    # -------------------------------------------------------------------------

    # URDF: wheel_radius="0.033"
    wheel_radius:        0.033    # [m]

    # wheel_separation_x  = half track-width (left ↔ right centre distance / 2)
    # URDF: wheel_y_offset="0.105"  (joint origin y for left wheels is +0.105,
    #                                right wheels is −0.105)
    wheel_separation_x:  0.105    # [m]

    # wheel_separation_y  = half wheelbase (front ↔ rear centre distance / 2)
    # URDF: wheel_x_offset="0.055"  (joint origin x for front wheels is +0.055,
    #                                rear wheels is −0.055)
    wheel_separation_y:  0.055    # [m]

    # Wheel centre height relative to base_link.
    # URDF: wheel_z_offset="-0.0784"
    wheel_z_offset:     -0.0784   # [m]

    # Maximum wheel angular speed — the physical speed that corresponds to
    # PWM ±255.  Measure this empirically: command PWM=255 on a free-running
    # wheel and record the rad/s from the encoder.
    max_motor_speed:     10.0     # [rad/s]

    # Per-motor PPR (Pulses Per Revolution) values [Motor0, Motor1, Motor2, Motor3]
    # Determined from motor characterization tests.
    # Motor 0 (RL): 881 PPR  – Rear Left
    # Motor 1 (RR): 899 PPR  – Rear Right
    # Motor 2 (FL): 1495 PPR – Front Left (different gearing/encoder configuration)
    # Motor 3 (FR): 900 PPR  – Front Right
    motor_ppr:  [890.0, 890.0, 1500.0, 890.0]

    # (Deprecated) Old single PPR value — motor_ppr above supersedes this.
    # Kept for backward compatibility only.
    encoder_ppr:  234.3

    # -------------------------------------------------------------------------
    # TF / frame IDs
    # -------------------------------------------------------------------------
    odom_topic:       "odom_wheel"
    odom_frame_id:    "odom_wheel"
    base_frame_id:    "base_link"
    publish_odom_tf:  false   # set true only if NOT using robot_localization EKF
    publish_wheel_tf: false  # false — use robot_state_publisher from URDF instead

    # -------------------------------------------------------------------------
    # Loop rates
    # -------------------------------------------------------------------------
    control_rate:  50.0    # [Hz]  PI control loop  — keep >= 2× odom_rate
    odom_rate:     20.0    # [Hz]  odometry publish rate

    # -------------------------------------------------------------------------
    # Per-wheel PI velocity controller
    # -------------------------------------------------------------------------
    # The control output is:
    #
    #   PWM = clamp( feedforward + Kp*e + Ki*integral(e), -255, 255 )
    #
    # where  e = ω_setpoint − ω_measured  [rad/s]
    #
    # Units
    #   pid_kp  :  PWM / (rad/s)  — how much PWM to add per rad/s of error
    #   pid_ki  :  PWM / rad      — how much PWM to add per accumulated rad of error
    #   pid_i_clamp : PWM         — maximum absolute value the integrator term
    #                               may contribute (anti-windup)
    #
    # Tuning recipe (start with Ki = 0):
    #   1. Set pid_kp = 0, pid_ki = 0.  Verify feedforward drives the robot
    #      roughly at the commanded speed.
    #   2. Raise pid_kp until speed tracks well without oscillation.
    #      Typical starting range: 10 – 30.
    #   3. Add pid_ki to eliminate steady-state error under load.
    #      Typical starting range: 20 – 60.
    #   4. If the robot jerks at the start of a move, lower pid_i_clamp.
    #
    # Gains can be updated live (no restart needed):
    #   ros2 param set /mecanum_driver pid_kp 25.0
    #
    # Current values tuned from motor characterization:
    # - All motors show good linearity (R² > 0.97) with modest dead-zone
    # - Average b coefficient (steady-state gain) ≈ 0.0252 RPS/PWM
    # - Conservative PI gains to ensure stability across all motor variants
    # -------------------------------------------------------------------------
    pid_kp:      22.0    # proportional gain [PWM / (rad/s)] - tuned from characterization
    pid_ki:      10.0    # integral gain [PWM / rad] - tuned from characterization
    pid_i_clamp: 100.0   # integrator anti-windup clamp [PWM units]

    publish_wheel_debug: true