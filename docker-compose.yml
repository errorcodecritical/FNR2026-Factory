version: '3.8'

# Docker Compose Profiles for different operation modes:
# - default: All hardware and basic localization stack (no SLAM)
# - slam_mapping: Active mapping mode (builds new maps)
# - slam_localization: Use pre-built maps for localization only
# - map_save: Save current map to disk
# - nav2_navigation: Autonomous navigation with Nav2 stack
# - visualization: Add RViz visualization
#
# Usage:
#   docker compose up                              # Default (drivers + processing)
#   docker compose --profile slam_mapping up       # With active SLAM mapping
#   docker compose --profile slam_localization up  # With localization mode
#   docker compose --profile map_save up           # Save the current map
#   docker compose --profile nav2_navigation up    # With Nav2 autonomous navigation
#   docker compose --profile visualization up      # Add RViz visualization

services:

  # ─────────────────────────────────────────────
  # BASE IMAGE (build only)
  # ─────────────────────────────────────────────

  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    container_name: fnr26factory-base
    image: fnr26factory-base:latest
    command: "true"
    # This service only builds the base image, doesn't run as container

    # ─────────────────────────────────────────────
    # HARDWARE DRIVERS (Always running)
    # ─────────────────────────────────────────────
    # These are core drivers required for any robot operation

  rplidar:
    build:
      context: .
      dockerfile: Dockerfile.rplidar
    container_name: rplidar-ros2-jazzy
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyUSB1:/dev/ttyUSB_CP210X
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - rplidar_ros
      - bash
      - -c
      - ros2 run rplidar_ros rplidar_composition --ros-args --remap __node:=rplidar_node -p rplidar_node:serial_port:="/dev/ttyUSB_CP210X" -p rplidar_node:serial_baudrate:=115200 -p rplidar_node:frame_id:="lidar_link" -p rplidar_node:inverted:=false -p rplidar_node:angle_compensate:=true

  minimu9_publisher:
    build:
      context: .
      dockerfile: Dockerfile.minimu9
    container_name: minimu9-publisher
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyACM0:/dev/ttyACM_ARDUINO
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - minimu9_publisher
      - bash
      - -c
      - ros2 run minimu9_publisher minimu9_node --ros-args --params-file /shared/minimu9_params.yaml

  mecanum_driver:
    build:
      context: .
      dockerfile: Dockerfile.mecanum
    container_name: mecanum-driver
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyACM1:/dev/ttyACM_PICO
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - mecanum_driver
      - bash
      - -c
      - ros2 launch mecanum_driver mecanum_driver.launch.py params_file:=/shared/mecanum_params.yaml

  teleop:
    build:
      context: .
      dockerfile: Dockerfile.teleop
    container_name: teleop
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /dev/input:/dev/input:rw
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - teleop_twist_joy
      - bash
      - -c
      - ros2 launch teleop_twist_joy teleop-launch.py config_filepath:=/shared/teleop_params.yaml

  # robot_state_publisher - publishes TF from URDF
  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    container_name: ros2-robot-publisher
    stdin_open: true
    tty: true
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - robot_description
      - bash
      - -c
      - ros2 launch robot_description robot_state_publisher.launch.py

  # ─────────────────────────────────────────────
  # FIRST-ORDER CONSUMERS
  # ─────────────────────────────────────────────

  # IMU Filter - filters raw IMU data
  imu_filter:
    build:
      context: .
      dockerfile: Dockerfile.localization
    container_name: imu-filter
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - imu_filter_madgwick
      - bash
      - -c
      - sleep 3 && ros2 run imu_filter_madgwick imu_filter_madgwick_node --ros-args --params-file /shared/imu_filter_madgwick.yaml

  # ─────────────────────────────────────────────
  # SECOND-ORDER CONSUMERS
  # ─────────────────────────────────────────────

  # EKF - fuses wheel odometry and filtered IMU
  robot_localization:
    build:
      context: .
      dockerfile: Dockerfile.localization
    container_name: robot-localization-ekf
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - ekf_launch
      - bash
      - -c
      - sleep 5 && ros2 run robot_localization ekf_node --ros-args --params-file /shared/ekf.yaml

  # ─────────────────────────────────────────────
  # SLAM & MAPPING SYSTEM
  # ─────────────────────────────────────────────
  # Profiles:
  #   slam_mapping: Active mapping mode (online_async)
  #   slam_localization: Localization in known map
  #   map_save: Save current map to disk
  #   visualization: Add RViz visualization
  # ─────────────────────────────────────────────
  # SLAM Mapping Service - Online Async Mode
  slam_mapping:
    build:
      context: .
      dockerfile: Dockerfile.slam
    container_name: fnr26-slam-mapping
    privileged: true
    network_mode: host
    volumes:
      - ./config:/root/nav2_ws/config
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - slam_toolbox
      - bash
      - -c
      - sleep 5 && ros2 launch slam_toolbox online_async_launch.py slam_params_file:=/shared/slam_configs/online_async.yaml use_sim_time:=false
    healthcheck:
      test: [ "CMD", "ros2", "topic", "hz", "/map" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # SLAM Localization Service - Localization Mode
  # Profile: slam_localization
  # Uses pre-built maps for localization only
  slam_localization:
    build:
      context: .
      dockerfile: Dockerfile.slam
    container_name: fnr26-slam-localization
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - slam_toolbox
      - bash
      - -c
      - sleep 5 && ros2 launch slam_toolbox localization_launch.py slam_params_file:=/shared/slam_configs/localization.yaml use_sim_time:=false
    healthcheck:
      test: [ "CMD", "ros2", "topic", "hz", "/map" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Map Saver Service - Saves current SLAM map to disk
  # Profile: map_save
  # Usage: docker-compose --profile map_save run map_saver
  map_saver:
    build:
      context: .
      dockerfile: Dockerfile.slam
    container_name: fnr26-slam-map-saver
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command: bash /shared/save_map.sh

  # Nav2 Navigation Service - Autonomous navigation using pre-built maps
  # Profile: nav2_navigation
  # Depends on: rplidar, robot_localization, publisher
  nav2_navigator:
    build:
      context: .
      dockerfile: Dockerfile.nav2
    container_name: fnr26-nav2-navigator
    privileged: true
    network_mode: host
    volumes:
      - ./config:/root/nav2_ws/config
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
      - MAP_FILE=${MAP_FILE:-/shared/maps/fnr26_map}
    stdin_open: true
    tty: true
    command:
      - nav2_bringup
      - bash
      - -c
      - sleep 5 && ros2 launch nav2_bringup bringup_launch.py map:=${MAP_FILE}.yaml params_file:=/shared/nav2_params.yaml use_sim_time:=false
    healthcheck:
      test: [ "CMD", "ros2", "topic", "hz", "/cmd_vel" ]
      interval: 10s
      timeout: 5s
      retries: 3

  electromagnet_gpio:
    build:
      context: .
      dockerfile: Dockerfile.electromagnet
    container_name: electromagnet-gpio
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - electromagnet_gpio
      - bash
      - -c
      - ros2 launch electromagnet_gpio electromagnet.launch.py params_file:=/shared/eletro_params.yaml

  # Factory autonomy - polls the competition server and sends Nav2 goals
  factory_autonomy:
    build:
      context: .
      dockerfile: Dockerfile.autonomy
    container_name: factory-autonomy
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - factory_autonomy
      - bash
      - -c
      - sleep 12 && ros2 launch factory_autonomy autonomy.launch.py params_file:=/shared/autonomy_params.yaml

  nav2:
    build:
      context: .
      dockerfile: Dockerfile.nav2
    container_name: nav2-navigation
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - nav2_localization
      - bash
      - -c
      - sleep 8 && ros2 launch nav2_localization nav2_localization.launch.py \ map:=/shared/maps/fnr26_map/fnr26_map.yaml \ params_file:=/shared/nav2_params.yaml \ use_sim_time:=false
  # ─────────────────────────────────────────────
  # VISUALIZATION
  # ─────────────────────────────────────────────
  # Profile: visualization (optional, add with --profile visualization)

  rviz2:
    build:
      context: .
      dockerfile: Dockerfile.rviz
    container_name: rviz2-visualization
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - rviz2
      - bash
      - -c
      - ros2 run rviz2 rviz2 -d /shared/view.rviz
