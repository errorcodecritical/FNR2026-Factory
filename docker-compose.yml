version: '3.8'

services:

  # Build runtime image once
  runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: fnr26-runtime:latest
    command: "true"



  # ─────────────────────────────────
  # RPLIDAR
  # ─────────────────────────────────

  rplidar:
    image: fnr26-runtime:latest
    container_name: rplidar

    privileged: true
    network_mode: host

    volumes:
      - /dev/ttyUSB_CP210X:/dev/ttyUSB_CP210X
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    environment:
      DISPLAY: ${DISPLAY}

    command: >
      bash -c "
      ros2 run rplidar_ros rplidar_composition
      --ros-args
      -p serial_port:=/dev/ttyUSB_CP210X
      "



  # ─────────────────────────────────
  # MECANUM DRIVER
  # ─────────────────────────────────

  mecanum_driver:
    image: fnr26-runtime:latest
    container_name: mecanum-driver

    privileged: true
    network_mode: host

    volumes:
      - /dev/ttyACM_PICO:/dev/ttyACM_PICO
      - ./shared:/shared
      - ./docker_ws:/docker_ws

    command: >
      bash -c "
      ros2 launch mecanum_driver
      mecanum_driver.launch.py
      params_file:=/shared/mecanum_params.yaml
      "



  # ─────────────────────────────────
  # IMU FILTER
  # ─────────────────────────────────

  imu_filter:
    image: fnr26-runtime:latest
    container_name: imu-filter

    network_mode: host

    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws

    command: >
      bash -c "
      sleep 3 &&
      ros2 run imu_filter_madgwick
      imu_filter_madgwick_node
      --ros-args
      --params-file /shared/imu_filter_madgwick.yaml
      "



  # ─────────────────────────────────
  # EKF LOCALIZATION
  # ─────────────────────────────────

  robot_localization:
    image: fnr26-runtime:latest
    container_name: robot-localization

    network_mode: host

    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws

    command: >
      bash -c "
      sleep 5 &&
      ros2 run robot_localization
      ekf_node
      --ros-args
      --params-file /shared/ekf.yaml
      "



  # ─────────────────────────────────
  # SLAM MAPPING
  # ─────────────────────────────────

  slam_mapping:
    image: fnr26-runtime:latest
    container_name: slam-mapping

    privileged: true
    network_mode: host

    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    environment:
      DISPLAY: ${DISPLAY}

    command: >
      bash -c "
      ros2 launch slam_toolbox
      online_async_launch.py
      slam_params_file:=/shared/slam_configs/online_async.yaml
      "



  # ─────────────────────────────────
  # NAV2
  # ─────────────────────────────────

  nav2:
    image: fnr26-runtime:latest
    container_name: nav2

    privileged: true
    network_mode: host

    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws

    command: >
      bash -c "
      sleep 8 &&
      ros2 launch nav2_localization
      nav2_localization.launch.py
      map:=/shared/maps/fnr26_map.yaml
      params_file:=/shared/nav2_params.yaml
      "



  # ─────────────────────────────────
  # RVIZ2
  # ─────────────────────────────────

  rviz2:
    image: fnr26-runtime:latest
    container_name: rviz2

    privileged: true
    network_mode: host

    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix

    environment:
      DISPLAY: ${DISPLAY}

    command: >
      ros2 run rviz2 rviz2
      -d /shared/view.rviz