  # # ─────────────────────────────────────────────

  # rviz2:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.nav2
  #   container_name: slam_rviz
  #   privileged: true
  #   network_mode: host
  #   volumes:
  #     - /tmp/.X11-unix:/tmp/.X11-unix:rw
  #   environment:
  #     - DISPLAY=${DISPLAY}
