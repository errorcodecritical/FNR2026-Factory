version: '3.8'

services:

  # ─────────────────────────────────────────────
  # HARDWARE DRIVERS (no dependencies)
  # ─────────────────────────────────────────────

  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    container_name: fnr26factory-base
    image: fnr26factory-base:latest
    # Don't run, just build
    command: "true"

  rplidar:
    build:
      context: .
      dockerfile: Dockerfile.rplidar
    container_name: rplidar-ros2-jazzy
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyUSB_CP210X:/dev/ttyUSB_CP210X
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - rplidar_ros
      - bash
      - -c
      - ros2 run rplidar_ros rplidar_composition --ros-args --remap __node:=rplidar_node -p rplidar_node:serial_port:="/dev/ttyUSB_CP210X" -p rplidar_node:serial_baudrate:=115200 -p rplidar_node:frame_id:="lidar_link" -p rplidar_node:inverted:=false -p rplidar_node:angle_compensate:=true

  minimu9_publisher:
    build:
      context: .
      dockerfile: Dockerfile.minimu9
    container_name: minimu9-publisher
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyACM_ARDUINO:/dev/ttyACM_ARDUINO
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - minimu9_publisher
      - bash
      - -c
      - ros2 run minimu9_publisher minimu9_node

  mecanum_driver:
    build:
      context: .
      dockerfile: Dockerfile.mecanum
    container_name: mecanum-driver
    privileged: true
    network_mode: host
    devices: []
    volumes:
      - /dev/ttyACM_PICO:/dev/ttyACM_PICO
      - ./shared:/shared
      - ./docker_ws:/docker_ws
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - mecanum_driver
      - bash
      - -c
      - ros2 launch mecanum_driver mecanum_driver.launch.py params_file:=/shared/mecanum_params.yaml

  teleop:
    build:
      context: .
      dockerfile: Dockerfile.teleop
    container_name: teleop
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /dev/input:/dev/input:rw
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    command:
      - teleop_twist_joy
      - bash
      - -c
      - ros2 launch teleop_twist_joy teleop-launch.py config_filepath:=/shared/teleop_params.yaml

  # robot_state_publisher - publishes TF from URDF
  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    container_name: ros2-robot-publisher
    stdin_open: true
    tty: true
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - robot_description
      - bash
      - -c
      - ros2 launch robot_description robot_state_publisher.launch.py

  # ─────────────────────────────────────────────
  # FIRST-ORDER CONSUMERS
  # ─────────────────────────────────────────────

  # RF2O Laser Odometry - provides odometry for SLAM
  rf2o_odometry:
    build:
      context: .
      dockerfile: Dockerfile.rf2o
    container_name: rf2o-laser-odometry
    privileged: true
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - ./config:/root/config
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    command:
      - rf2o_laser_odometry
      - bash
      - -c
      - sleep 3 && ros2 run rf2o_laser_odometry rf2o_laser_odometry_node --ros-args --params-file /shared/rf2o_params.yaml

  # IMU Filter - filters raw IMU data
  imu_filter:
    build:
      context: .
      dockerfile: Dockerfile.localization
    container_name: imu-filter
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - ./config:/root/config
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    depends_on:
      - minimu9_publisher
    command:
      - imu_filter_madgwick
      - bash
      - -c
      - sleep 3 && ros2 run imu_filter_madgwick imu_filter_madgwick_node --ros-args --params-file /root/config/imu_filter_madgwick.yaml

  # ─────────────────────────────────────────────
  # SECOND-ORDER CONSUMERS
  # ─────────────────────────────────────────────

  # EKF - fuses RF2O odometry and filtered IMU
  robot_localization:
    build:
      context: .
      dockerfile: Dockerfile.localization
    container_name: robot-localization-ekf
    network_mode: host
    volumes:
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - ./config:/root/config
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    depends_on:
      - imu_filter
      - rf2o_odometry
    command:
      - robot_localization
      - bash
      - -c
      - sleep 5 && ros2 run robot_localization ekf_node --ros-args --params-file /root/config/ekf.yaml

  # SLAM Toolbox for mapping
  slam_mapping:
    build:
      context: .
      dockerfile: Dockerfile.nav2
    container_name: nav2-slam-mapping
    privileged: true
    network_mode: host
    volumes:
      - ./config:/root/nav2_ws/config
      - ./shared:/shared
      - ./docker_ws:/docker_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=/shared/cyclonedds.xml
    stdin_open: true
    tty: true
    depends_on:
      - rplidar
      - robot_localization
      - publisher
    command:
      - slam_toolbox
      - bash
      - -c
      - sleep 5 && ros2 launch slam_toolbox online_async_launch.py slam_params_file:=/root/nav2_ws/config/mapper_params_online_async.yaml use_sim_time:=false

  # # ─────────────────────────────────────────────
